<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes wave-animation {
        0%, 100% { d: path("M0 140 Q200 110 400 135 Q600 160 800 130 V200 H0 Z"); }
        50% { d: path("M0 130 Q200 160 400 135 Q600 110 800 140 V200 H0 Z"); }
      }
      .waving { animation: wave-animation 10s ease-in-out infinite; }
      
      /* Subtle text float animation */
      @keyframes text-float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .text-glow { filter: url(#glow); animation: text-float 6s ease-in-out infinite; }
    </style>

    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <path class="waving" fill="url(#mainGrad)" 
        d="M0 140 Q200 110 400 135 Q600 160 800 130 V200 H0 Z" />

  <g class="text-glow">
    <text x="400" y="90" text-anchor="middle" dominant-baseline="middle"
      font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800"
      fill="#ffffff">
      José Novais
    </text>

    <text x="400" y="132" text-anchor="middle" dominant-baseline="middle"
      font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600"
      fill="#ffffff" opacity="0.8" letter-spacing="3">
      TELECOM &amp; INFORMATICS ENGINEER  ·  GUIMARÃES, PORTUGAL
    </text>
  </g>
</svg>
