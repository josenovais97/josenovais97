<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#121826"/>
    </linearGradient>
    
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Waves -->
  <path d="M0 150 Q200 120 400 145 Q600 170 800 140 L800 200 L0 200 Z" fill="url(#wave2)"/>
  <path d="M0 165 Q200 140 400 160 Q600 185 800 155 L800 200 L0 200 Z" fill="url(#wave1)"/>

  <!-- Minimal dots -->
  <circle cx="80" cy="40" r="2" fill="#06B6D4" opacity="0.4"/>
  <circle cx="720" cy="50" r="2" fill="#4F46E5" opacity="0.4"/>
  <circle cx="400" cy="20" r="1.5" fill="#06B6D4" opacity="0.25"/>

  <!-- Symbols (refined) -->
  <g font-family="monospace" font-size="18" font-weight="600"
     fill="#06B6D4" opacity="0.25">
    <text x="100" y="105" text-anchor="middle">&lt;/&gt;</text>
    <text x="700" y="105" text-anchor="middle">{ }</text>
  </g>

  <!-- Accent line -->
  <line x1="260" y1="100" x2="540" y2="100"
        stroke="#06B6D4" stroke-width="1"
        stroke-linecap="round" opacity="0.3"/>

  <!-- Name -->
  <text x="400" y="92" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="44" font-weight="700"
    fill="#FFFFFF">
    José Novais
  </text>

  <!-- Subtitle -->
  <text x="400" y="132" text-anchor="middle"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="13"
    fill="#9CA3AF"
    letter-spacing="2">
    TELECOM &amp; INFORMATICS ENGINEER · GUIMARÃES, PORTUGAL
  </text>

</svg>
